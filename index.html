<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coleman Pandolfino</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #dce8f5;
      --fg: #0d1f33;
      --muted: #6a8aaa;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .name {
      font-family: 'Cormorant', serif;
      font-size: clamp(2.8rem, 10vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 1s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .name em {
      font-style: italic;
      font-weight: 300;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 1s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .bio {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 1s 0.45s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .socials {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      opacity: 0;
      animation: fadeUp 1s 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.2rem;
      border: 1px solid #b8cfe8;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all 0.2s ease;
      background: #ccdff2;
    }

    .social-link:hover {
      border-color: var(--fg);
      color: var(--fg);
      background: #b8cfe8;
    }

    .social-link .arrow {
      font-size: 0.65rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s ease;
    }

    .social-link:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── EBK ── */
    .ebk-wrap {
      margin-top: 3rem;
      opacity: 0;
      animation: fadeUp 1s 0.75s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .ebk-label {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .ebk-card {
      background: #ccdff2;
      border: 1px solid #b8cfe8;
      border-radius: 2px;
      padding: 1.2rem 1.4rem;
      text-align: left;
    }

    .ebk-player {
      font-family: 'Cormorant', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--fg);
      margin-bottom: 0.5rem;
    }

    .ebk-blurb {
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.75;
      letter-spacing: 0.02em;
      margin-bottom: 0.8rem;
    }

    .ebk-question {
      font-size: 0.64rem;
      color: var(--muted);
      font-style: italic;
      padding-top: 0.75rem;
      border-top: 1px solid #b8cfe8;
      letter-spacing: 0.02em;
    }

    .ebk-countdown {
      margin-top: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8aaac8;
      text-align: right;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 3rem;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: #8aaac8;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <h1 class="name">Coleman<br /><em>Pandolfino</em></h1>

    <div class="divider"></div>

    <p class="bio">Student at Lake Forest High School</p>

    <div class="socials">
      <a href="mailto:Colemanpandolfino@gmail.com" class="social-link">
        <span>Email</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://instagram.com/cpando28" class="social-link" target="_blank">
        <span>Instagram</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://www.snapchat.com/add/cpando08" class="social-link" target="_blank">
        <span>Snapchat</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://www.tiktok.com/@cpando08" class="social-link" target="_blank">
        <span>TikTok</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://www.linkedin.com/in/coleman-pandolfino-467169324" class="social-link" target="_blank">
        <span>LinkedIn</span>
        <span class="arrow">↗</span>
      </a>
    </div>

    <!-- EBK DAILY PICK -->
    <div class="ebk-wrap">
      <p class="ebk-label">Today's EBK pick</p>
      <div class="ebk-card">
        <p class="ebk-player" id="ebk-name">Loading…</p>
        <p class="ebk-blurb" id="ebk-blurb"></p>
        <p class="ebk-question" id="ebk-question"></p>
      </div>
      <p class="ebk-countdown">Next pick in <span id="ebk-timer" style="font-variant-numeric:tabular-nums;">--:--:--</span></p>
    </div>

    <p class="footer">© 2026 Coleman Pandolfino</p>

  </div>

  <script>
    const WORKER_URL = "https://red-flower-8837.colemanpandolfino.workers.dev";

    (async function () {
      try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        document.getElementById("ebk-name").textContent = data.name;
        document.getElementById("ebk-blurb").textContent = data.blurb;
        document.getElementById("ebk-question").textContent = "🏀 " + data.question;
      } catch (err) {
        document.getElementById("ebk-name").textContent = "Couldn't load today's pick";
        document.getElementById("ebk-blurb").textContent = err.message;
      }
    })();

    function updateCountdown() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setUTCHours(24, 0, 0, 0);
      const diff = midnight - now;
      const h = String(Math.floor(diff / 3600000)).padStart(2, "0");
      const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
      const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");
      document.getElementById("ebk-timer").textContent = `${h}:${m}:${s}`;
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
